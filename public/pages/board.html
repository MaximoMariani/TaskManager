<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tablero — Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <div class="topbar-left">
    <div class="logo-mark">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
    </div>
    <span class="app-name" id="teamLabel">Task Manager</span>
  </div>

  <nav class="topbar-nav">
    <a href="/pages/board.html" class="nav-link active">Tablero</a>
    <a href="/pages/dashboard.html" class="nav-link">Dashboard</a>
  </nav>

  <div class="topbar-right">
    <span class="user-chip" id="userChip">—</span>
    <button class="btn-theme" id="themeBtn" onclick="toggleTheme()" title="Modo oscuro">🌙</button>
    <button class="btn-logout" onclick="logout()">Salir</button>
  </div>
</header>

<!-- DAILY SUMMARY PANEL -->
<div id="dailySummary" class="daily-summary"></div>

<!-- FILTERS BAR -->
<div class="filters-bar">
  <div class="filters-left">
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Buscar tarea..." class="search-input" />
    </div>

    <select id="filterArea" class="filter-select">
      <option value="">Todas las áreas</option>
      <option value="PRODUCCION">Producción</option>
      <option value="CONTENIDO">Contenido</option>
      <option value="DISENO">Diseño</option>
      <option value="ADMIN">Admin</option>
    </select>

    <select id="filterAssigned" class="filter-select">
      <option value="">Todos los asignados</option>
    </select>
  </div>

  <button class="btn-new" onclick="openModal()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 5v14M5 12h14"/>
    </svg>
    Nueva tarea
  </button>
</div>

<!-- QUICK FILTER CHIPS + SMART SORT -->
<div class="chips-bar">
  <div class="chips-list">
    <button class="chip chip-active" data-chip="all"        onclick="setChip('all')">Todas</button>
    <button class="chip"             data-chip="mine"       onclick="setChip('mine')">Mis tareas</button>
    <button class="chip"             data-chip="urgent"     onclick="setChip('urgent')">
      <span class="chip-dot chip-dot-red"></span>Urgentes
    </button>
    <button class="chip"             data-chip="overdue"    onclick="setChip('overdue')">Vencidas</button>
    <button class="chip"             data-chip="today"      onclick="setChip('today')">
      <span class="chip-dot chip-dot-amber"></span>Hoy
    </button>
    <button class="chip"             data-chip="unassigned" onclick="setChip('unassigned')">Sin asignar</button>
  </div>

  <!-- Smart Sort toggle -->
  <button class="btn-smart-sort" id="smartSortBtn" title="Activar orden inteligente">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
      <line x1="8" y1="18" x2="21" y2="18"/>
      <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/>
      <line x1="3" y1="18" x2="3.01" y2="18"/>
    </svg>
    Orden inteligente
  </button>
</div>

<!-- KANBAN BOARD -->
<main class="board">
  <div class="column" id="col-TODO" data-status="TODO">
    <div class="col-header">
      <span class="col-dot dot-todo"></span>
      <span class="col-title">Por hacer</span>
      <span class="col-count" id="count-TODO">0</span>
    </div>
    <div class="col-body" id="cards-TODO" ondragover="onDragOver(event)" ondrop="onDrop(event,'TODO')"></div>
  </div>

  <div class="column" id="col-DOING" data-status="DOING">
    <div class="col-header">
      <span class="col-dot dot-doing"></span>
      <span class="col-title">En progreso</span>
      <span class="col-count" id="count-DOING">0</span>
    </div>
    <div class="col-body" id="cards-DOING" ondragover="onDragOver(event)" ondrop="onDrop(event,'DOING')"></div>
  </div>

  <div class="column" id="col-DONE" data-status="DONE">
    <div class="col-header">
      <span class="col-dot dot-done"></span>
      <span class="col-title">Completado</span>
      <span class="col-count" id="count-DONE">0</span>
    </div>
    <div class="col-body" id="cards-DONE" ondragover="onDragOver(event)" ondrop="onDrop(event,'DONE')"></div>
  </div>
</main>

<!-- MODAL: CREATE / EDIT TASK -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modalTitle">Nueva tarea</h2>
      <button class="modal-close" onclick="closeModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <div class="modal-body">
      <input type="hidden" id="taskId" />

      <div class="form-group">
        <label>Título <span class="req">*</span></label>
        <input type="text" id="taskTitle" placeholder="¿Qué hay que hacer?" class="form-input" />
      </div>

      <div class="form-group">
        <label>Descripción</label>
        <textarea id="taskDescription" placeholder="Detalles opcionales..." class="form-textarea"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Área</label>
          <select id="taskArea" class="form-input">
            <option value="PRODUCCION">Producción</option>
            <option value="CONTENIDO">Contenido</option>
            <option value="DISENO">Diseño</option>
            <option value="ADMIN" selected>Admin</option>
          </select>
        </div>
        <div class="form-group">
          <label>Estado</label>
          <select id="taskStatus" class="form-input">
            <option value="TODO">Por hacer</option>
            <option value="DOING">En progreso</option>
            <option value="DONE">Completado</option>
          </select>
        </div>
      </div>

      <div class="form-group">
          <label>Participantes</label>
          <div class="ptag-wrap" id="participantTags"></div>
          <div class="ptag-hint">Escribí un nombre y presioná Enter para agregar</div>
        </div>

      <div class="form-group">
        <label>Fecha objetivo</label>
        <input type="date" id="taskDueDate" class="form-input" />
      </div>

      <div class="modal-error" id="modalError"></div>
    </div>

    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" id="saveBtn" onclick="saveTask()">Guardar tarea</button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM -->
<div class="modal-overlay" id="deleteOverlay" onclick="closeDeleteOutside(event)">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2 class="modal-title">Eliminar tarea</h2>
      <button class="modal-close" onclick="closeDelete()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <p style="color:var(--text-muted);font-size:14px;line-height:1.6;">¿Seguro que querés eliminar esta tarea? Esta acción no se puede deshacer.</p>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeDelete()">Cancelar</button>
      <button class="btn-danger" id="confirmDeleteBtn">Eliminar</button>
    </div>
  </div>
</div>

<script src="/js/board.js"></script>
</body>
</html>
