<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso — Baesics Pro Organization</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f0efe9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-wrapper {
      width: 100%;
      max-width: 400px;
      padding: 24px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo .icon {
      width: 52px;
      height: 52px;
      background: #18181b;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
    }

    .login-logo .icon svg { color: white; }

    .login-logo h1 {
      font-size: 20px;
      font-weight: 700;
      color: #18181b;
      letter-spacing: -0.3px;
    }

    .login-logo p {
      font-size: 14px;
      color: #71717a;
      margin-top: 4px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.06);
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #3f3f46;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e4e4e7;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: #18181b;
      outline: none;
      transition: border-color .15s;
      background: #fafafa;
    }

    input:focus {
      border-color: #18181b;
      background: white;
    }

    .btn-primary {
      width: 100%;
      padding: 11px;
      background: #18181b;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: background .15s, transform .1s;
    }

    .btn-primary:hover { background: #27272a; }
    .btn-primary:active { transform: scale(.98); }
    .btn-primary:disabled { background: #a1a1aa; cursor: not-allowed; }

    .error-msg {
      display: none;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-top: 14px;
    }

    .error-msg.visible { display: block; }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-logo">
      <div class="icon" style="font-family:'DM Sans',sans-serif;font-size:20px;font-weight:800;letter-spacing:-0.5px;">B</div>
      <h1 id="teamName">Baesics Pro</h1>
      <p style="letter-spacing:1.5px;text-transform:uppercase;font-size:11px;font-weight:600;color:#b8975a;">Organization</p>
    </div>

    <div class="card">
      <div class="form-group">
        <label for="userName">Tu nombre</label>
        <input type="text" id="userName" placeholder="Ej: Ana García" autocomplete="name" />
      </div>
      <div class="form-group">
        <label for="password">Contraseña del equipo</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn-primary" id="loginBtn" onclick="doLogin()">Ingresar</button>
      <div class="error-msg" id="errorMsg"></div>
    </div>
  </div>

  <script>
    // Check if already logged in
    fetch('/api/auth/me').then(r => {
      if (r.ok) window.location.href = '/pages/board.html';
    });

    const input = document.getElementById('password');
    input.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    document.getElementById('userName').addEventListener('keydown', e => { if (e.key === 'Enter') input.focus(); });

    async function doLogin() {
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('errorMsg');
      const userName = document.getElementById('userName').value.trim();
      const password = document.getElementById('password').value;

      errEl.classList.remove('visible');

      if (!userName) { showError('Ingresá tu nombre.'); return; }
      if (!password) { showError('Ingresá la contraseña.'); return; }

      btn.disabled = true;
      btn.textContent = 'Ingresando...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password, userName }),
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = '/pages/board.html';
        } else {
          showError(data.error || 'Error al ingresar.');
        }
      } catch {
        showError('Error de conexión. ¿Está el servidor corriendo?');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Ingresar';
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('visible');
    }
  </script>
</body>
</html>
